services:
  - type: web
    name: foolio
    runtime: node
    disk:
      name: foolio-data
      mountPath: /var/data
      sizeGB: 1
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        value: file:/var/data/foolio.db