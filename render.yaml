services:
  - type: web
    name: foolio
    runtime: static
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: SKIP_INSTALL_DEPS
        value: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html