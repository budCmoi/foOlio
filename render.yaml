services:
  - type: web
    name: foolio
    runtime: node
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: DATABASE_URL
        value: file:/var/data/foolio.db
    disks:
      - name: foolio-data
        mountPath: /var/data